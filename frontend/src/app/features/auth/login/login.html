<div class="login-container">
  <div class="login-card">

    <!-- Branding -->
    <div class="brand">
      <h1>RideX</h1>
      <p>Your smart ride partner</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="error-box">
      {{ errorMessage }}
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <input 
          type="email" 
          formControlName="email" 
          placeholder="Enter your email"
        />
        <small *ngIf="email.touched && email.invalid">
          Valid email is required
        </small>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <input 
          type="password" 
          formControlName="password" 
          placeholder="Enter your password"
        />
        <small *ngIf="password.touched && password.invalid">
          Minimum 8 characters required
        </small>
      </div>

      <!-- Submit -->
      <button 
        type="submit" 
        [disabled]="isLoading"
        class="login-btn"
      >
        <span *ngIf="!isLoading">Login</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>

    </form>

    <!-- Divider -->
    <div class="divider">
      <span>OR</span>
    </div>

    <!-- Social Login -->
    <div class="social-login">
      <button class="google-btn">Continue with Google</button>
      <button class="apple-btn">Continue with Apple</button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Don't have an account? <a routerLink="/auth/register">Sign up</a></p>
    </div>

  </div>
</div>
