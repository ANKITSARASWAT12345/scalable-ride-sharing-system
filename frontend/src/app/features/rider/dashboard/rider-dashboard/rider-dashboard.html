<div class="dashboard">

  <!-- TOP NAV -->
  <div class="topbar">
    <div class="logo">RideX</div>
    <div class="user">
      <span>Hi, {{ user?.name }}</span>
      <button (click)="logout()">Logout</button>
    </div>
  </div>

  <!-- VIEW SWITCH -->
  <div class="tabs">
    <button 
      [class.active]="view === 'book'" 
      (click)="view = 'book'"
    >
      Book Ride
    </button>
    <button 
      [class.active]="view === 'history'" 
      (click)="view = 'history'"
    >
      History
    </button>
  </div>

  <!-- ERROR -->
  <div *ngIf="errorMessage" class="error-box">
    {{ errorMessage }}
  </div>

  <!-- BOOK RIDE VIEW -->
  <div *ngIf="view === 'book'" class="booking-section">

    <!-- ACTIVE RIDE -->
  <div *ngIf="activeRide as ride" class="active-ride">
      <h3>Active Ride</h3>
     
       <p>{{ statusLabel(ride.status) }}</p>

     <div class="ride-info">
    <p><strong>Pickup:</strong> {{ ride.pickupAddress }}</p>
    <p><strong>Drop:</strong> {{ ride.dropAddress }}</p>
  </div>

      <div class="actions">
        <button (click)="refreshRide()">Refresh</button>
        <button class="cancel" (click)="cancelRide()">Cancel Ride</button>
      </div>
    </div>

    <!-- BOOKING FORM -->
    <form [formGroup]="bookingForm" (ngSubmit)="bookRide()" class="booking-form">

      <input type="text" placeholder="Pickup Location" formControlName="pickupAddress" />
      <input type="text" placeholder="Drop Location" formControlName="dropAddress" />

      <!-- VEHICLES -->
      <div class="vehicles">
        <div 
          *ngFor="let v of vehicles"
          class="vehicle-card"
          [class.active]="bookingForm.value.vehicleType === v.type"
          (click)="selectVehicle(v.type)"
        >
          <div class="icon">{{ v.icon }}</div>
          <div>
            <h4>{{ v.label }}</h4>
            <p>{{ v.desc }}</p>
          </div>
        </div>
      </div>

      <!-- BOOK BUTTON -->
      <button type="submit" [disabled]="isBooking" class="book-btn">
        <span *ngIf="!isBooking">Book Ride</span>
        <span *ngIf="isBooking" class="loader"></span>
      </button>

    </form>

  </div>

  <!-- HISTORY VIEW -->
  <div *ngIf="view === 'history'" class="history-section">

    <h3>Your Rides</h3>

    <div *ngIf="isLoadingHistory">Loading...</div>

    <div *ngFor="let ride of rideHistory" class="ride-card">
      <p><strong>{{ ride.pickupAddress }}</strong> → {{ ride.dropAddress }}</p>
      <span class="status">{{ ride.status }}</span>
    </div>

  </div>

</div>
